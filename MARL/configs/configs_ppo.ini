[MODEL_CONFIG]
; for the RMSprop optimizer
epsilon = 1e-5
alpha = 0.99
reward_gamma = 0.99
MAX_GRAD_NORM = 5
; roll out n steps
ROLL_OUT_N_STEPS = 100
; only remember the latest ROLL_OUT_N_STEPS
MEMORY_CAPACITY = 100
; only use the latest ROLL_OUT_N_STEPS for training A2C
BATCH_SIZE = 16
ENTROPY_REG = 0.01
; seeds for pytorch, 0, 2000, 2021
torch_seed = 0
TARGET_UPDATE_STEPS = 3
TARGET_TAU = 1.0

; concurrent
training_strategy = concurrent
actor_hidden_size = 128
critic_hidden_size = 128
action_masking = True
; "greedy", "regionalR", "global_R"
reward_type = global_R

[TRAIN_CONFIG]
MAX_EPISODES = 20000
EPISODES_BEFORE_TRAIN = 1
EVAL_EPISODES = 3
EVAL_INTERVAL = 200
reward_scale = 20.
actor_lr = 5e-4
critic_lr = 5e-4
test_seeds = 0,25,50,75,100,125,150,175,200,325,350,375,400,425,450,475,500,525,550,575

; Module switches for pure MAPPO training
perception_enabled = False
llm_enabled = False

risk_alert_enabled = True
risk_alert_threshold = 0.65

; SanDRA: risk-triggered LLM override for high-risk vehicles only
sandra_enabled = True
sandra_risk_threshold = 0.65
sandra_openai_env_file = configs/openai.env
sandra_temperature = 0.2
sandra_request_timeout = 12
sandra_max_retries = 1
sandra_log_decisions = True
sandra_use_safety_filter = True
sandra_rewrite_penalty = 0.25
sandra_min_risk_improve = 0.00
sandra_preview_horizon = 3
sandra_block_on_crash = True
sandra_log_candidates = True
sandra_top_k = 3
sandra_formal_check_enabled = True
sandra_rule_min_ttc = 2.0
sandra_rule_min_headway_time = 1.5
sandra_rule_lane_change_front_gap = 12.0
sandra_rule_lane_change_rear_gap = 8.0
sandra_rule_verify_horizon_s = 2.0
sandra_use_shapely = True
sandra_use_py_rss = True


[ENV_CONFIG]
; seed for the environment, 0, 2000, 2021
seed = 0
; [Hz]
simulation_frequency = 15
; time step
duration = 20
policy_frequency = 5
COLLISION_REWARD = 200
HIGH_SPEED_REWARD = 3
HEADWAY_COST = 1
HEADWAY_TIME = 1.2
MERGING_LANE_COST = 4
; 1: easy,  2: medium,  3: hard
traffic_density = 2
LANE_CHANGE_COST = 0.2
MERGE_SUCCESS_REWARD = 3
controlled_vehicles = 4

; FDPF-style risk assessment for 4 controlled vehicles
risk_assessment_enabled = True
risk_upsilon_coeff_s = 0.3
risk_upsilon_coeff_l = 0.7
risk_major_scale = 3.0
risk_semi_scale = 0.8
risk_decay_coeff = 0.3
risk_lane_margin = 0.8
risk_look_back = 30
risk_look_ahead = 40
risk_lateral_scope_lanes = 2.0
